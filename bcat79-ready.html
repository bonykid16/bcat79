<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="BCAT 79"/>
<meta name="theme-color" content="#0c0f18"/>
<title>BCAT 79</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0c0f18;--surface:#111827;--surface2:#0f1825;
  --border:#1a2535;--border2:#243348;
  --blue:#2563eb;--blue-dim:#1e3a5f;
  --cyan:#38bdf8;--cyan-dim:#93c5fd;
  --green:#4ade80;--green-dark:#166534;--green-bg:#0a2218;
  --red:#f87171;--red-dark:#7f1d1d;--red-bg:#2a0a0a;
  --purple:#a78bfa;--purple-dark:#4c1d95;
  --gold:#fbbf24;--text:#dde3ec;--text-dim:#b0bec5;--text-muted:#5a6a7e;
  --fn:'Space Mono',monospace;--fd:'Syne',sans-serif;
  --st:env(safe-area-inset-top);--sb:env(safe-area-inset-bottom);
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--fn);font-size:14px}
button{font-family:var(--fn);cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:var(--fn);font-size:14px;outline:none;color:var(--text)}

#app{display:flex;flex-direction:column;height:100%;height:100dvh}
#hdr{padding:calc(var(--st) + 12px) 16px 12px;background:linear-gradient(160deg,#131c2e,#0c0f18);
  border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0}
.logo{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,#2563eb,#06b6d4);
  display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:16px;font-weight:900;color:#fff;flex-shrink:0}
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
#nav{display:flex;background:var(--surface);border-top:1px solid var(--border);
  padding-bottom:var(--sb);flex-shrink:0}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:10px 4px;gap:3px;cursor:pointer;transition:opacity .15s}
.nb em{font-size:22px;font-style:normal;line-height:1}
.nb span{font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text-muted)}
.nb.active span{color:var(--cyan)}

.page{display:none;padding:16px;padding-bottom:32px}
.page.active{display:block}

.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:14px}
.ct{font-size:10px;color:var(--cyan);text-transform:uppercase;letter-spacing:1.4px;font-weight:700;margin-bottom:12px}
.gcard{border-radius:14px;padding:18px;margin-bottom:14px;border:1px solid #1e40af;
  background:linear-gradient(140deg,#0f2747,#0c1a35)}

.ytabs{display:flex;gap:8px;margin-bottom:16px}
.ytab{flex:1;padding:8px;border-radius:8px;font-size:13px;font-weight:700;text-align:center;cursor:pointer;
  background:var(--surface);border:1px solid var(--border);color:var(--text-muted)}
.ytab.active{background:var(--blue);border-color:var(--blue);color:#fff}

.btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:12px 20px;
  border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;border:none;
  font-family:var(--fn);width:100%;transition:opacity .15s}
.btn:active{opacity:.75}
.bp{background:var(--blue);color:#fff}
.br{background:var(--red-bg);color:var(--red);border:1px solid var(--red-dark)}
.bg{background:transparent;color:var(--cyan-dim);border:1px solid #1e40af40}
.bsm{padding:7px 12px;font-size:11px;width:auto;border-radius:7px}

.grid-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.cg{border-collapse:collapse;width:100%;font-size:10px;white-space:nowrap}
.cg th{padding:6px 3px;color:var(--text-muted);font-size:9px;letter-spacing:.8px;text-transform:uppercase;
  border-bottom:1px solid var(--border);font-weight:700;text-align:center}
.cg th:first-child{text-align:left;padding-left:6px;min-width:52px}
.cg td{padding:5px 3px;border-bottom:1px solid #141c2b;text-align:center}
.cg td:first-child{text-align:left;padding-left:6px;color:var(--cyan-dim);font-weight:700}
.cg tr:nth-child(even) td{background:#0f182522}
.cb{width:24px;height:22px;border-radius:4px;background:#1e3a5f22;border:1px solid #1e3a5f44;
  display:inline-flex;align-items:center;justify-content:center;cursor:pointer;font-size:11px}
.cb.paid{background:#dcfce7;border-color:#86efac;color:#15803d;font-weight:900}
.cb.unpaid{color:var(--border2)}
.grandrow td{background:#0f1825!important;color:var(--text-muted);font-weight:700;font-size:9px;
  padding-top:8px;border-top:1px solid var(--border2)}

.mcards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px}
.mc{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px}
.mc-grand{background:linear-gradient(135deg,#1e1a3a,#0f1825);border-color:var(--purple-dark)}
.mdots{display:flex;flex-wrap:wrap;gap:3px;margin-top:8px}
.mdot{width:9px;height:9px;border-radius:2px;background:var(--blue-dim)}
.mdot.paid{background:var(--green)}

.li{border-radius:10px;padding:12px;margin-bottom:8px;border:1px solid var(--border)}
.li:nth-child(even){background:var(--surface2)}

.badge{display:inline-block;padding:2px 8px;border-radius:5px;font-size:10px;font-weight:700}

.msg{border-radius:8px;padding:10px 12px;font-size:12px;font-weight:600;margin-bottom:12px;display:none}
.msg.show{display:block}
.msg.ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-dark)}
.msg.err{background:var(--red-bg);color:var(--red);border:1px solid var(--red-dark)}

.overlay{position:fixed;inset:0;background:#000c;z-index:100;display:none;align-items:flex-end}
.overlay.open{display:flex}
.sheet{background:var(--surface);border-top:1px solid var(--border);border-radius:20px 20px 0 0;
  padding:20px;padding-bottom:calc(20px + var(--sb));width:100%;max-height:92dvh;
  overflow-y:auto;-webkit-overflow-scrolling:touch;animation:su .25s ease}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sh{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px}
.shdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.stitle{font-family:var(--fd);font-size:17px;font-weight:800}
.sclose{font-size:26px;color:var(--text-muted);padding:2px 8px;line-height:1}

.field{margin-bottom:14px}
.field label{display:block;font-size:10px;color:var(--text-muted);text-transform:uppercase;
  letter-spacing:1px;font-weight:700;margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;background:var(--surface2);
  border:1px solid var(--border2);border-radius:10px;padding:12px;color:var(--text);
  font-family:var(--fn);font-size:14px}
.field textarea{height:70px;resize:none}
.field input:focus,.field select:focus{border-color:var(--cyan)}
.fbadge{background:var(--green-bg);border:1px solid var(--green-dark);border-radius:8px;
  padding:10px 12px;font-size:12px;color:var(--green);margin-bottom:14px}

.pr{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:4px}
.pc{padding:8px 12px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;
  background:var(--surface2);border:1px solid var(--border);color:var(--text-muted);font-family:var(--fn)}
.pc.active{background:var(--blue);border-color:var(--blue);color:#fff}
.mgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.srow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sc{padding:11px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;text-align:center;
  background:var(--surface2);border:1px solid var(--border);color:var(--text-muted);font-family:var(--fn)}
.sc.sp.active{background:var(--green-dark);border-color:var(--green);color:#fff}
.sc.su.active{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.cr{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.cc{padding:9px 4px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;text-align:center;
  background:var(--surface2);border:1px solid var(--border);color:var(--text-muted);font-family:var(--fn)}
.cc.active{border-width:2px}

.fab{position:fixed;bottom:calc(76px + var(--sb));right:20px;width:56px;height:56px;
  border-radius:28px;background:var(--blue);display:flex;align-items:center;justify-content:center;
  font-size:28px;color:#fff;line-height:1;box-shadow:0 4px 20px #2563eb66;z-index:50;
  cursor:pointer;border:none;transition:transform .15s}
.fab:active{transform:scale(.92)}

#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:14px;z-index:200}
.spin{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--cyan);
  border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

.divider{height:1px;background:var(--border);margin:12px 0}
.row{display:flex;align-items:center}
.brow{display:flex;justify-content:space-between;align-items:center;margin-top:6px}
</style>
</head>
<body>

<div id="loading"><div class="spin"></div><p style="font-size:12px;color:var(--text-muted)">Connecting…</p></div>

<div id="app" style="display:none">
  <div id="hdr">
    <div class="logo">79</div>
    <div style="flex:1">
      <div style="font-family:var(--fd);font-size:17px;font-weight:900">BCAT Batch 79</div>
      <div style="font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.2px">Contribution & Cash Manager</div>
    </div>
  </div>

  <div id="content">
    <div class="page active" id="page-dashboard">
      <div id="dash-ytabs" class="ytabs"></div>
      <div id="dash-body"></div>
    </div>
    <div class="page" id="page-contributions">
      <div id="cmsg" class="msg"></div>
      <div id="contrib-ytabs" class="ytabs"></div>
      <div class="card" style="padding:12px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <span class="ct" style="margin:0">Payment Grid</span>
          <span id="cgrand" style="color:var(--purple);font-weight:800;font-size:13px"></span>
        </div>
        <div class="grid-wrap"><table class="cg" id="cgrid"></table></div>
      </div>
      <div id="scards" class="mcards"></div>
    </div>
    <div class="page" id="page-cash">
      <div id="cashmsg" class="msg"></div>
      <div class="gcard">
        <div class="ct" style="color:var(--cyan-dim)">Available Balance</div>
        <div id="cashbal" style="font-family:var(--fd);font-size:34px;font-weight:900;color:var(--cyan);letter-spacing:-1px"></div>
        <div class="divider" style="border-color:#1e40af;margin:12px 0"></div>
        <div class="brow"><span style="font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px">Opening</span><span id="cashopen" style="font-weight:700;font-size:13px;color:var(--cyan-dim)"></span></div>
        <div class="brow"><span style="font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px">Released</span><span id="cashrel" style="font-weight:700;font-size:13px;color:var(--red)"></span></div>
        <div class="brow"><span style="font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px">Transactions</span><span id="cashcnt" style="font-weight:700;font-size:13px"></span></div>
      </div>
      <div class="card"><div class="ct">Disbursement Ledger</div><div id="ledger"></div></div>
    </div>
  </div>

  <nav id="nav">
    <button class="nb active" onclick="goTab('dashboard',this)"><em>📊</em><span>Dashboard</span></button>
    <button class="nb" onclick="goTab('contributions',this)"><em>💳</em><span>Contributions</span></button>
    <button class="nb" onclick="goTab('cash',this)"><em>💰</em><span>Cash</span></button>
  </nav>
</div>

<button class="fab" id="fab" onclick="openFab()">+</button>

<!-- Contribution modal -->
<div class="overlay" id="mod-contrib" onclick="closeModal('mod-contrib')">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sh"></div>
    <div class="shdr"><span class="stitle">Mark Contribution</span><button class="sclose" onclick="closeModal('mod-contrib')">×</button></div>
    <div class="fbadge">Fixed amount: <strong>₱1,000.00</strong> per section</div>
    <div class="field"><label>Section</label><div class="pr" id="msec"></div></div>
    <div class="field"><label>Month</label><div class="mgrid" id="mmon"></div></div>
    <div class="field"><label>Status</label>
      <div class="srow">
        <button class="sc sp active" id="sbtn-paid" onclick="setStatus(true)">✓ Paid</button>
        <button class="sc su" id="sbtn-unpaid" onclick="setStatus(false)">✗ Unpaid</button>
      </div>
    </div>
    <div id="cmodmsg" class="msg"></div>
    <button class="btn bp" onclick="saveContrib()">Save</button>
  </div>
</div>

<!-- Cash modal -->
<div class="overlay" id="mod-cash" onclick="closeModal('mod-cash')">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sh"></div>
    <div class="shdr"><span class="stitle" id="cmod-title">Record Disbursement</span><button class="sclose" onclick="closeModal('mod-cash')">×</button></div>
    <div class="field"><label>Date *</label><input type="date" id="f-date"/></div>
    <div class="field"><label>Amount (₱) *</label><input type="number" id="f-amt" placeholder="0.00" inputmode="decimal"/></div>
    <div class="field"><label>Recipient *</label><input type="text" id="f-rec" placeholder="Full name"/></div>
    <div class="field"><label>Category</label><div class="cr" id="catpicker"></div></div>
    <div class="field"><label>Notes</label><textarea id="f-notes" placeholder="Optional…"></textarea></div>
    <div id="cashmodmsg" class="msg"></div>
    <button class="btn bp" onclick="saveCash()">Save</button>
  </div>
</div>

<script>
// ── Config ────────────────────────────────────────────────────────
const URL  = 'https://ddftcdnxufzeeogxcfnl.supabase.co';
const ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkZnRjZG54dWZ6ZWVvZ3hjZm5sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5MDY4NDksImV4cCI6MjA5NjQ4Mjg0OX0.cLG53_NE6HP8mue-KGp3apKcGeAfucnr076GdXVs4RQ';
const HDRS = { 'apikey': ANON, 'Authorization': 'Bearer ' + ANON, 'Content-Type': 'application/json', 'Prefer': 'return=representation' };

// ── Pure fetch wrappers — NO supabase-js library needed ───────────
async function dbGet(table, params) {
  let qs = Object.entries(params||{}).map(([k,v])=>k+'='+encodeURIComponent(v)).join('&');
  const r = await fetch(URL+'/rest/v1/'+table+'?'+qs, { headers: HDRS });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function dbUpsert(table, body) {
  const r = await fetch(URL+'/rest/v1/'+table, {
    method:'POST', headers:{...HDRS,'Prefer':'resolution=merge-duplicates,return=representation'}, body:JSON.stringify(body)
  });
  if (!r.ok) throw new Error(await r.text());
  const data = await r.json();
  return Array.isArray(data) ? data[0] : data;
}
async function dbInsert(table, body) {
  const r = await fetch(URL+'/rest/v1/'+table, {
    method:'POST', headers: HDRS, body: JSON.stringify(body)
  });
  if (!r.ok) throw new Error(await r.text());
  const data = await r.json();
  return Array.isArray(data) ? data[0] : data;
}
async function dbUpdate(table, id, body) {
  const r = await fetch(URL+'/rest/v1/'+table+'?id=eq.'+id, {
    method:'PATCH', headers: HDRS, body: JSON.stringify(body)
  });
  if (!r.ok) throw new Error(await r.text());
  const data = await r.json();
  return Array.isArray(data) ? data[0] : data;
}
async function dbDelete(table, id) {
  const r = await fetch(URL+'/rest/v1/'+table+'?id=eq.'+id, { method:'DELETE', headers: HDRS });
  if (!r.ok) throw new Error(await r.text());
}

// ── Constants ─────────────────────────────────────────────────────
const MONTHS   = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const SECTIONS = [1,2,3,4,5,6,7,8];
const CATS     = ['Donation','Help','Personal Use'];
const FIXED    = 1000;
const YEARS    = [2024,2025,2026,2027];
const OPENING  = 46259.35;
const CATC     = { Donation:{bg:'#1e3a5f',fg:'#93c5fd'}, Help:{bg:'#3b2f00',fg:'#fbbf24'}, 'Personal Use':{bg:'#1e1a3a',fg:'#c4b5fd'} };

const peso = v => '₱' + Number(v).toLocaleString('en-PH',{minimumFractionDigits:2,maximumFractionDigits:2});
const today = () => new Date().toISOString().slice(0,10);

// ── State ──────────────────────────────────────────────────────────
let contribs = [], cashTxns = [];
let activeYear = new Date().getFullYear(), activeTab = 'dashboard';
let cashEditId = null, mPaid = true, mSec = 1, mMon = MONTHS[new Date().getMonth()], mCat = 'Donation';

// ── Boot ──────────────────────────────────────────────────────────
async function boot() {
  try {
    // Simple connectivity test first
    const test = await fetch(URL + '/rest/v1/settings?key=eq.opening_balance', { headers: HDRS });
    if (!test.ok) throw new Error('Cannot reach database. Check if SQL setup was run.');

    const [cr, tr] = await Promise.all([
      dbGet('contributions', { year: 'eq.' + activeYear, order: 'section.asc,month.asc' }),
      dbGet('cash_transactions', { order: 'txn_date.asc,created_at.asc' }),
    ]);
    contribs = cr;
    cashTxns = tr;
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    buildAll();
  } catch(e) {
    document.getElementById('loading').innerHTML =
      '<div style="padding:30px;text-align:center;max-width:320px">' +
      '<div style="font-size:36px;margin-bottom:16px">⚠️</div>' +
      '<div style="color:var(--red);font-size:13px;line-height:1.6;margin-bottom:20px">' + e.message + '</div>' +
      '<div style="font-size:11px;color:var(--text-muted);line-height:1.8">' +
      'Make sure you ran the SQL setup in your Supabase project.<br>Then tap Retry.' +
      '</div><br>' +
      '<button class="btn bp" style="max-width:200px;margin:0 auto" onclick="location.reload()">↺ Retry</button>' +
      '</div>';
  }
}

// ── Build All UI ──────────────────────────────────────────────────
function buildAll() { buildYearTabs(); buildDash(); buildContrib(); buildCash(); buildPickers(); }

// ── Year tabs ─────────────────────────────────────────────────────
function buildYearTabs() {
  ['dash','contrib'].forEach(p => {
    document.getElementById(p+'-ytabs').innerHTML = YEARS.map(y =>
      `<div class="ytab${y===activeYear?' active':''}" onclick="setYear(${y})">${y}</div>`
    ).join('');
  });
}

// ── Table data ────────────────────────────────────────────────────
function getTableData() {
  return SECTIONS.map(s => {
    const row = { section:s, paidCount:0 };
    MONTHS.forEach(m => {
      const c = contribs.find(x => x.section===s && x.month===m);
      row[m] = c ? c.paid : false;
      if (row[m]) row.paidCount++;
    });
    row.total = row.paidCount * FIXED;
    return row;
  });
}

// ── Dashboard ─────────────────────────────────────────────────────
function buildDash() {
  const td = getTableData();
  const grandTotal = td.reduce((s,r)=>s+r.total,0);
  const totalOut   = cashTxns.reduce((s,t)=>s+Number(t.amount),0);
  const cashBal    = OPENING - totalOut;

  let h = `<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <span class="ct" style="margin:0">💳 Contributions — ${activeYear}</span>
      <span style="color:var(--purple);font-weight:800;font-size:13px">${peso(grandTotal)}</span>
    </div>`;

  td.forEach(row => {
    h += `<div style="display:flex;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);gap:6px">
      <span style="color:var(--cyan-dim);font-weight:700;font-size:12px;width:58px">Sec ${row.section}</span>
      <div style="display:flex;flex-wrap:wrap;gap:2px;flex:1">`;
    MONTHS.forEach(m => {
      h += `<div style="width:14px;height:14px;border-radius:3px;background:${row[m]?'#dcfce7':'var(--blue-dim)'};display:flex;align-items:center;justify-content:center">${row[m]?'<span style="font-size:8px;color:#15803d;font-weight:900">✓</span>':''}</div>`;
    });
    h += `</div><span style="color:var(--purple);font-weight:700;font-size:11px;white-space:nowrap">${peso(row.total)}</span></div>`;
  });

  h += `<div style="display:flex;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">
    <span style="font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px">Grand Total</span>
    <span style="color:var(--purple);font-weight:900;font-size:16px">${peso(grandTotal)}</span>
  </div></div>`;

  h += `<div class="gcard">
    <div class="ct" style="color:var(--cyan-dim)">💰 Cash on Hand</div>
    <div style="font-family:var(--fd);font-size:32px;font-weight:900;color:var(--cyan);letter-spacing:-1px">${peso(cashBal)}</div>
    <div class="divider" style="border-color:#1e40af;margin:12px 0"></div>
    <div class="brow"><span style="font-size:10px;color:var(--text-muted)">Opening</span><span style="color:var(--cyan-dim);font-weight:700">${peso(OPENING)}</span></div>
    <div class="brow"><span style="font-size:10px;color:var(--text-muted)">Released</span><span style="color:var(--red);font-weight:700">−${peso(totalOut)}</span></div>
    <div class="brow"><span style="font-size:10px;color:var(--text-muted)">Transactions</span><span style="font-weight:700">${cashTxns.length}</span></div>
  </div>`;

  if (cashTxns.length > 0) {
    h += `<div class="card"><div class="ct">Recent Disbursements</div>`;
    cashTxns.slice(-4).reverse().forEach(t => {
      const cs = CATC[t.category]||CATC.Donation;
      h += `<div style="display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--border)">
        <div>
          <div style="font-weight:700;font-size:13px">${t.recipient}</div>
          <div style="font-size:11px;color:var(--text-muted)">${t.txn_date}</div>
          <span class="badge" style="background:${cs.bg};color:${cs.fg};margin-top:4px">${t.category}</span>
        </div>
        <span style="color:var(--red);font-weight:800;font-size:14px">−${peso(t.amount)}</span>
      </div>`;
    });
    h += `</div>`;
  }

  document.getElementById('dash-body').innerHTML = h;
}

// ── Contributions page ────────────────────────────────────────────
function buildContrib() {
  const td = getTableData();
  const grandTotal = td.reduce((s,r)=>s+r.total,0);
  const mc = {};
  MONTHS.forEach(m => { mc[m] = td.filter(r=>r[m]).length; });
  document.getElementById('cgrand').textContent = peso(grandTotal);

  let th = '<thead><tr><th>Section</th>';
  MONTHS.forEach(m => th += `<th>${m}</th>`);
  th += '<th>Paid</th><th>Total</th></tr></thead>';

  let tb = '<tbody>';
  td.forEach(row => {
    tb += `<tr><td>Sec ${row.section}</td>`;
    MONTHS.forEach(m => {
      tb += `<td><button class="cb ${row[m]?'paid':'unpaid'}" onclick="toggleCell(${row.section},'${m}')">${row[m]?'✓':'—'}</button></td>`;
    });
    tb += `<td style="color:var(--cyan);font-weight:700">${row.paidCount}/12</td>
           <td style="color:var(--purple);font-weight:700">${peso(row.total)}</td></tr>`;
  });
  tb += `<tr class="grandrow"><td>Monthly</td>`;
  MONTHS.forEach(m => tb += `<td style="color:${mc[m]>0?'var(--cyan-dim)':'var(--border2)'}">${mc[m]}/8</td>`);
  tb += `<td colspan="2" style="color:var(--purple);font-weight:800">${peso(grandTotal)}</td></tr></tbody>`;
  document.getElementById('cgrid').innerHTML = th + tb;

  let cards = '';
  td.forEach(row => {
    const dots = MONTHS.map(m=>`<div class="mdot${row[m]?' paid':''}"></div>`).join('');
    cards += `<div class="mc">
      <div style="font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Section ${row.section}</div>
      <div style="font-family:var(--fd);font-size:15px;font-weight:800;color:var(--purple)">${peso(row.total)}</div>
      <div style="font-size:10px;color:var(--cyan);margin-top:2px">${row.paidCount}/12 paid</div>
      <div class="mdots">${dots}</div>
    </div>`;
  });
  const totalPaid = td.reduce((s,r)=>s+r.paidCount,0);
  cards += `<div class="mc mc-grand">
    <div style="font-size:9px;color:var(--purple);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">All Sections</div>
    <div style="font-family:var(--fd);font-size:15px;font-weight:800;color:#c4b5fd">${peso(grandTotal)}</div>
    <div style="font-size:10px;color:#6b5e9e;margin-top:2px">${totalPaid} total payments</div>
  </div>`;
  document.getElementById('scards').innerHTML = cards;
}

// ── Cash page ─────────────────────────────────────────────────────
function buildCash() {
  const totalOut = cashTxns.reduce((s,t)=>s+Number(t.amount),0);
  const bal = OPENING - totalOut;
  document.getElementById('cashbal').textContent  = peso(bal);
  document.getElementById('cashopen').textContent = peso(OPENING);
  document.getElementById('cashrel').textContent  = '−' + peso(totalOut);
  document.getElementById('cashcnt').textContent  = cashTxns.length;

  let runBal = OPENING, h = '';
  h += `<div style="background:var(--surface2);border-radius:10px;padding:10px 12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">
    <span style="color:var(--cyan);font-weight:700">⬤ Opening Balance</span>
    <span style="color:var(--cyan);font-weight:800">${peso(OPENING)}</span>
  </div>`;

  if (!cashTxns.length) h += `<p style="text-align:center;color:var(--text-muted);padding:20px;font-size:12px">No transactions yet. Tap + to add one.</p>`;

  cashTxns.forEach((t,i) => {
    runBal -= Number(t.amount);
    const cs = CATC[t.category]||CATC.Donation;
    const bc = runBal >= 5000 ? 'var(--green)' : 'var(--red)';
    h += `<div class="li">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
        <div style="flex:1">
          <div style="font-weight:700;font-size:14px">${t.recipient}</div>
          <div style="font-size:11px;color:var(--text-muted)">${t.txn_date}</div>
          <span class="badge" style="background:${cs.bg};color:${cs.fg};margin-top:5px;display:inline-block">${t.category}</span>
          ${t.notes?`<span style="font-size:10px;color:var(--text-muted);margin-left:6px">${t.notes}</span>`:''}
        </div>
        <span style="color:var(--red);font-weight:800;font-size:15px;white-space:nowrap">−${peso(t.amount)}</span>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px">
        <span style="color:${bc};font-size:11px;font-weight:700">Bal: ${peso(runBal)}</span>
        <div style="display:flex;gap:6px">
          <button class="btn bg bsm" onclick="editCash('${t.id}')">Edit</button>
          <button class="btn br bsm" onclick="delCash('${t.id}','${t.recipient.replace(/'/g,"\\'")}')">Del</button>
        </div>
      </div>
    </div>`;
  });

  if (cashTxns.length) {
    h += `<div class="divider"></div>
      <div style="display:flex;justify-content:space-between;margin-bottom:6px">
        <span style="font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px">Total Released</span>
        <span style="color:var(--red);font-weight:900;font-size:15px">−${peso(totalOut)}</span>
      </div>
      <div style="display:flex;justify-content:space-between">
        <span style="font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px">Balance</span>
        <span style="color:var(--green);font-weight:900;font-size:15px">${peso(bal)}</span>
      </div>`;
  }
  document.getElementById('ledger').innerHTML = h;
}

// ── Pickers ───────────────────────────────────────────────────────
function buildPickers() {
  document.getElementById('msec').innerHTML = SECTIONS.map(s =>
    `<button class="pc${s===mSec?' active':''}" onclick="setSec(${s})">${s}</button>`).join('');
  document.getElementById('mmon').innerHTML = MONTHS.map(m =>
    `<button class="pc${m===mMon?' active':''}" onclick="setMon('${m}')">${m}</button>`).join('');
  document.getElementById('catpicker').innerHTML = CATS.map(c => {
    const cs = CATC[c], a = c===mCat;
    return `<button class="cc${a?' active':''}" onclick="setCat('${c}')"
      style="${a?'background:'+cs.bg+';border-color:'+cs.fg+';color:'+cs.fg:''}">${c}</button>`;
  }).join('');
}

// ── Navigation ────────────────────────────────────────────────────
function goTab(tab, btn) {
  activeTab = tab;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  document.querySelectorAll('.nb').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('content').scrollTop = 0;
}

async function setYear(y) {
  activeYear = y;
  buildYearTabs();
  try {
    contribs = await dbGet('contributions', { year:'eq.'+y, order:'section.asc,month.asc' });
    buildDash(); buildContrib();
  } catch(e) { showMsg('cmsg', e.message, false); }
}

// ── Toggle cell ───────────────────────────────────────────────────
async function toggleCell(section, month) {
  const cur = contribs.find(x => x.section===section && x.month===month);
  const newPaid = !(cur && cur.paid);
  try {
    const data = await dbUpsert('contributions', { section, month, year:activeYear, paid:newPaid, paid_date: newPaid?today():null });
    if (cur) contribs = contribs.map(x => x.section===section&&x.month===month ? data : x);
    else contribs.push(data);
    buildContrib(); buildDash();
    showMsg('cmsg', `Section ${section} — ${month} ${activeYear}: ${newPaid?'PAID ✓':'UNPAID ✗'}`, newPaid);
  } catch(e) { showMsg('cmsg', e.message, false); }
}

// ── Contrib modal ─────────────────────────────────────────────────
function openFab() {
  if (activeTab === 'contributions') {
    document.getElementById('cmodmsg').className = 'msg';
    openModal('mod-contrib');
  } else {
    cashEditId = null;
    document.getElementById('cmod-title').textContent = 'Record Disbursement';
    document.getElementById('f-date').value = today();
    document.getElementById('f-amt').value = '';
    document.getElementById('f-rec').value = '';
    document.getElementById('f-notes').value = '';
    mCat = 'Donation'; buildPickers();
    document.getElementById('cashmodmsg').className = 'msg';
    openModal('mod-cash');
  }
}

function setSec(s) { mSec=s; document.querySelectorAll('#msec .pc').forEach((el,i)=>el.classList.toggle('active',SECTIONS[i]===s)); }
function setMon(m) { mMon=m; document.querySelectorAll('#mmon .pc').forEach((el,i)=>el.classList.toggle('active',MONTHS[i]===m)); }
function setStatus(p) {
  mPaid=p;
  document.getElementById('sbtn-paid').classList.toggle('active',p);
  document.getElementById('sbtn-unpaid').classList.toggle('active',!p);
}
function setCat(c) { mCat=c; buildPickers(); }
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

async function saveContrib() {
  try {
    const data = await dbUpsert('contributions', { section:mSec, month:mMon, year:activeYear, paid:mPaid, paid_date:mPaid?today():null });
    const cur = contribs.find(x=>x.section===mSec&&x.month===mMon);
    if (cur) contribs = contribs.map(x=>x.section===mSec&&x.month===mMon?data:x);
    else contribs.push(data);
    closeModal('mod-contrib');
    buildContrib(); buildDash();
    showMsg('cmsg', `Section ${mSec} — ${mMon} ${activeYear}: ${mPaid?'PAID ✓':'UNPAID ✗'}`, mPaid);
  } catch(e) { showMsg('cmodmsg', e.message, false); }
}

// ── Cash modal ────────────────────────────────────────────────────
function editCash(id) {
  const t = cashTxns.find(x=>x.id===id); if(!t) return;
  cashEditId = id;
  document.getElementById('cmod-title').textContent = 'Edit Disbursement';
  document.getElementById('f-date').value  = t.txn_date;
  document.getElementById('f-amt').value   = t.amount;
  document.getElementById('f-rec').value   = t.recipient;
  document.getElementById('f-notes').value = t.notes||'';
  mCat = t.category; buildPickers();
  document.getElementById('cashmodmsg').className = 'msg';
  openModal('mod-cash');
}

async function saveCash() {
  const txn_date  = document.getElementById('f-date').value;
  const amount    = parseFloat(document.getElementById('f-amt').value);
  const recipient = document.getElementById('f-rec').value.trim();
  const notes     = document.getElementById('f-notes').value.trim();
  if (!txn_date||isNaN(amount)||amount<=0||!recipient) {
    showMsg('cashmodmsg','Fill Date, Amount and Recipient.',false); return;
  }
  try {
    if (cashEditId) {
      const data = await dbUpdate('cash_transactions', cashEditId, {txn_date,amount,recipient,category:mCat,notes});
      cashTxns = cashTxns.map(t=>t.id===cashEditId?data:t);
      showMsg('cashmsg','Transaction updated.',true);
    } else {
      const data = await dbInsert('cash_transactions', {txn_date,amount,recipient,category:mCat,notes});
      cashTxns.push(data);
      showMsg('cashmsg', `${peso(amount)} released to ${recipient}.`, true);
    }
    closeModal('mod-cash'); buildCash(); buildDash();
  } catch(e) { showMsg('cashmodmsg', e.message, false); }
}

function delCash(id, name) {
  if (!confirm('Delete disbursement to ' + name + '?')) return;
  dbDelete('cash_transactions', id).then(()=>{
    cashTxns = cashTxns.filter(t=>t.id!==id);
    buildCash(); buildDash();
    showMsg('cashmsg','Transaction deleted.',true);
  }).catch(e=>showMsg('cashmsg',e.message,false));
}

// ── Messages ──────────────────────────────────────────────────────
function showMsg(id, text, ok) {
  const el = document.getElementById(id);
  el.textContent = (ok?'✓ ':'⚠ ') + text;
  el.className = 'msg show ' + (ok?'ok':'err');
  setTimeout(()=>{ el.className='msg'; }, 4000);
}

// ── Start ─────────────────────────────────────────────────────────
boot();
</script>
</body>
</html>
